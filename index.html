<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Robust Legged Locomotion</title>
    <meta
      name="description"
      content="Learning long-horizon proprioceptive representations for robust legged locomotion."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <header class="hero">
        <h1>Learning Long-Horizon Proprioceptive Representations for Robust Legged Locomotion</h1>
        <p class="authors">FENG Wenshuo · The University of Hong Kong</p>
      </header>

      <section aria-labelledby="demos-title">
        <div class="section-heading">
          <p class="eyebrow">Real World Deployment</p>
          <h2 id="demos-title">Robust locomotion on Unitree Go2</h2>
        </div>

        <div class="demo-category">
          <h3>Walk</h3>
          <div class="demo-row">
            <figure>
              <video controls muted loop playsinline>
                <source src="assets/demos/mtt/walk/grass_walk.mp4" type="video/mp4">
              </video>
              <figcaption>Grass walk</figcaption>
            </figure>
          </div>
        </div>

        <div class="demo-category">
          <h3>Push recovery</h3>
          <div class="demo-row">
            <figure>
              <video controls muted loop playsinline>
                <source src="assets/demos/mtt/push/flat_push.mp4" type="video/mp4">
              </video>
              <figcaption>Flat ground push</figcaption>
            </figure>
            <figure>
              <video controls muted loop playsinline>
                <source src="assets/demos/mtt/push/slight_slope_push.mp4" type="video/mp4">
              </video>
              <figcaption>Slight slope push</figcaption>
            </figure>
          </div>
        </div>

        <div class="demo-category">
          <h3>Slope</h3>
          <div class="demo-row">
            <figure>
              <video controls muted loop playsinline>
                <source src="assets/demos/mtt/slope/upslope.mp4" type="video/mp4">
              </video>
              <figcaption>Up slope</figcaption>
            </figure>
            <figure>
              <video controls muted loop playsinline>
                <source src="assets/demos/mtt/slope/down_slope.mp4" type="video/mp4">
              </video>
              <figcaption>Down slope</figcaption>
            </figure>
          </div>
        </div>

        <div class="demo-category">
          <h3>Stairs — comparison with baseline</h3>
          <div class="demo-compare">
            <div class="compare-col">
              <span class="compare-label label-baseline">HIM (Baseline)</span>
              <figure>
                <video controls muted loop playsinline>
                  <source src="assets/demos/him/stairs/up.mp4" type="video/mp4">
                </video>
                <figcaption>Stairs up</figcaption>
              </figure>
            </div>
            <div class="compare-col">
              <span class="compare-label label-ours">Ours</span>
              <figure>
                <video controls muted loop playsinline>
                  <source src="assets/demos/mtt/stairs/up.mp4" type="video/mp4">
                </video>
                <figcaption>Stairs up</figcaption>
              </figure>
            </div>
          </div>
          <div class="demo-row" style="margin-top: 12px;">
            <figure>
              <video controls muted loop playsinline>
                <source src="assets/demos/mtt/stairs/higher.mp4" type="video/mp4">
              </video>
              <figcaption>High stairs</figcaption>
            </figure>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
